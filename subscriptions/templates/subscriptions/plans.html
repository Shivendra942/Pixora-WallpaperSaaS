{% extends 'base.html' %}

{% block content %}

<div class="container text-center">
    <h2>Choose Your Plan</h2>

    <div style="display:flex; gap:30px; justify-content:center; margin-top:40px; flex-wrap:wrap;">

        {% for plan in plans %}
        <div class="card p-4">
            <h3>{{ plan.name }}</h3>
            <p>₹{{ plan.price }} / month</p>

            <!-- 🔥 IMPORTANT: data-id instead of inline JS -->
            <button type="button"
                    class="btn btn-danger subscribe-btn"
                    data-id="{{ plan.id }}">
                Subscribe
            </button>
        </div>
        {% empty %}
            <p>No plans available</p>
        {% endfor %}

    </div>
</div>

<!-- Razorpay -->
<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

<script>
function getCSRFToken() {
    return document.cookie.split('; ')
        .find(row => row.startsWith('csrftoken'))
        ?.split('=')[1];
}

// 🔥 Attach event listener (more reliable than onclick)
document.querySelectorAll('.subscribe-btn').forEach(btn => {
    btn.addEventListener('click', function () {
        const planId = this.getAttribute('data-id');
        buyPlan(planId);
    });
});

function buyPlan(planId) {

    console.log("👉 Sending plan:", planId);

    fetch(`/create-order/${planId}/`)
    .then(res => {
        if (!res.ok) {
            throw new Error("Plan not found or server error");
        }
        return res.json();
    })
    .then(data => {

        console.log("✅ Order Data:", data);

        var options = {
            key: data.key,
            amount: data.amount,
            currency: "INR",
            order_id: data.order_id,

            name: "Wallpaper Premium",
            description: "Subscription Plan",

            prefill: {
                name: "{{ request.user.username|default:'User' }}",
                email: "test@example.com",
                contact: "9999999999"
            },

            handler: function (response) {

                fetch('/payment-success/', {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/x-www-form-urlencoded",
                        "X-CSRFToken": getCSRFToken()
                    },
                    body: `plan_id=${planId}&razorpay_payment_id=${response.razorpay_payment_id}&razorpay_order_id=${response.razorpay_order_id}&razorpay_signature=${response.razorpay_signature}`
                })
                .then(res => res.json())
                .then(data => {

                    if (data.status === "success") {
                        window.location.href = "/premium/";
                    } else {
                        alert("Payment verification failed");
                    }
                })
                .catch(() => {
                    alert("Error saving payment");
                });
            },

            theme: {
                color: "#ff2e2e"
            }
        };

        var rzp = new Razorpay(options);
        rzp.open();
    })
    .catch(err => {
        console.error("❌ ERROR:", err);
        alert("Something went wrong. Check console.");
    });
}
</script>

{% endblock %}
