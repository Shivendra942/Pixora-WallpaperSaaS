{% extends 'base.html' %}

{% block content %}

<div class="container text-center">
    <h2>Choose Your Plan</h2>

    <div style="display:flex; gap:30px; justify-content:center; margin-top:40px;">

        <!-- BASIC -->
        <div class="card p-4">
            <h3>Basic</h3>
            <p>₹49 / month</p>
            <button type="button" onclick="buyPlan(1)" class="btn btn-danger">
                Subscribe
            </button>
        </div>

        <!-- PRO -->
        <div class="card p-4">
            <h3>Pro</h3>
            <p>₹99 / month</p>
            <button type="button" onclick="buyPlan(2)" class="btn btn-dark">
                Subscribe
            </button>
        </div>

    </div>
</div>

<!-- Razorpay Script -->
<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

<script>
// CSRF token helper
function getCSRFToken() {
    return document.cookie.split('; ')
        .find(row => row.startsWith('csrftoken'))
        ?.split('=')[1];
}

function buyPlan(planId) {

    console.log("Clicked plan:", planId);

    fetch(`/create-order/${planId}/`)
    .then(res => res.json())
    .then(data => {

        console.log("Order Data:", data);

        var options = {
            key: data.key,
            amount: data.amount,
            currency: "INR",
            order_id: data.order_id,

            name: "Wallpaper Premium",
            description: "Subscription Plan",

            // 👉 force card (avoid UPI test issues)
            method: {
                card: true
            },

            prefill: {
                name: "{{ request.user.username|default:'User' }}",
                email: "test@example.com",
                contact: "9999999999"
            },

            handler: function (response) {
                console.log("Payment success:", response);

                fetch('/payment-success/', {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/x-www-form-urlencoded",
                        "X-CSRFToken": getCSRFToken()
                    },
                    body: `plan_id=${planId}&razorpay_payment_id=${response.razorpay_payment_id}&razorpay_order_id=${response.razorpay_order_id}&razorpay_signature=${response.razorpay_signature}`
                })
                .then(res => res.json())
                .then(data => {
                    console.log("Backend response:", data);

                    if (data.status === "success") {
                        window.location.href = "/premium/";
                    } else {
                        alert("Payment verification failed");
                    }
                })
                .catch(err => {
                    console.error("Error:", err);
                    alert("Error saving payment");
                });
            },

            modal: {
                ondismiss: function () {
                    console.log("Payment popup closed");
                }
            },


            theme: {
                color: "#ff2e2e"
            }
        };

        var rzp = new Razorpay(options);
        rzp.open();

    })
    .catch(err => {
        console.error("Error:", err);
        alert("Something went wrong. Check console.");
    });
}
</script>

{% endblock %}
